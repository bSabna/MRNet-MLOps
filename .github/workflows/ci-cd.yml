name: MLOps CI/CD Pipeline

# Trigger this pipeline every time code is pushed to the 'main' branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Clone your repository onto the GitHub cloud runner
    - name: Checkout Code
      uses: actions/checkout@v4

    # Step 2: Set up Python environment for validation checks
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # Step 3: Check Python code for syntax errors or formatting issues (Linting)
    - name: Lint with flake8
      run: |
        pip install flake8
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # Step 4: Set up Docker Buildx (advanced caching tools)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 5: Test build the Docker image to guarantee it works in production
    - name: Test Build Docker Image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false # Do not push to a public registry yet (we will add this next!)
        tags: mrnet-api:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max